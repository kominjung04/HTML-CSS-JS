<!DOCTYPE html>
<html lang="ko">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <!-- Google Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style></style>
  <script>
  </script>
</head>

<body>
  <h1>객체 (object :: 속성(변수)과 기능(함수)의 집합체 )</h1>
  <p></p>
  <a href="/"><span class="material-icons icon">home</span>돌아가기</a>
  <hr>
  <ul>
    <li>객체의 생성과 접근</li>
    <script>
      //배열
      var arr = ["Alice", "age"]
      console.log(arr[0], arr[1])

      //객체
      const person = {
        name: "Alice",
        age: 25,
        isStudent: true,
        go: function () {
          console.log("go go go!")
        }
      }
      console.log(person.name); console.log(person.age); person.go()
    </script>

    <li>객체의 속성 추가, 수정, 삭제</li>
    <script>
      person.job = "Developer" //객체의 속성 추가
      person.age = 26  // 속성 수정
      delete person.isStudent; // 속성 삭제
      console.log(person)
    </script>

    <li>객체의 메서드(함수)</li>
    <script>
      const person2 = {
        name: "Alice",
        age: 25,
        isStudent: true,
        greet: function () {
          console.log("Hello I'm " + this.name)
        }
      }
      person2.greet()
    </script>

    <li>객체의 전체 접근</li>
    <script>
      for (let key in person2) {
        console.log(key, person2[key])
      }
      // person2 is not iterable
      // for (let key of person2) {
      //   console.log(key, person2[key])
      // }
    </script>

    <li>중첩 객체</li>
    <script>
      const user = {
        id: 1,
        profile: {
          username: "g_dev",
          email: "g_dev@example.com"
        }
      };
      console.log(user.profile.username);
    </script>

    <li>객체의 구조 분해 할당</li>
    <script>
      const person3 = {
        name: "Alice",
        age: 25,
      };

      const { name, age } = person3;
      // 객체의 구조분해 할당은 키값이 같을 경우 할당된다.
      console.log(name); // Alice
      console.log(age);  // 25
    </script>

    <li>객체 단축 문법 (ES6)</li>
    <script>
      let name2 = "Eve";
      let age2 = 20;

      const student = { name2, age2 };
      console.log(student); // { name2: "Eve", age2: 20 }

    </script>

  </ul>


</body>

</html>

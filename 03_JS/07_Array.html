  <h1>배열(Array :: 같은 이름으로 여러개의 원소를 지정)</h1>
  <p>배열은 원소에 접근할 때 index로 접근, 배열은 자체적으로 길이 값을 제공</p>

  <ol>
    <li>배열의 선언과 접근</li>
    <script>
      //개별적으로 변수 선언하기 매우 번거러움
      const scoreCy = 100; const scoreMs = 100; const scoreJw = 100;

      //하나의 이름으로 여러개의 값을 담을 수 있음
      let scores = [88, 78, 92, 64, 100, 99]
      let tot = 0;
      for (i = 0; i < scores.length; i++) {
        tot += scores[i]
      }
      for(let idx in scores){ //index로 접근
        console.log("index접근:",idx,scores[idx])
      }
      for(let score of scores){ // 원소로 접근
        console.log("원소 접근:",scores)
      }

      //alert(`합계는 ${tot}, 평균는 ${Math.floor(tot / score.length)}`)
      const fruits = ["Apple", "Banana", "Grape"]
      console.log(fruits[0])
      console.log(fruits)
    </script>

    <li>배열의 함수(push, pop, shift, unshift, splice, slice, indexOf, includes)</li>
    <script>
      //=====stack=====
      //push() -마지막 원소 추가, pop() - 마지막 원소 제거
      console.log("===원소 추가/삭제===")
      const stack = [1, 2, 3, 4, 5]
      console.log(stack)
      stack.push(6) // 마지막에 원소 추가
      console.log(stack)
      console.log(stack.pop())//마지막 원소 제거
      console.log(stack)
      //=====Queue=====
      //push() - 맨 마지막 원소 추가
      //pop() - 마지막 원소 제거
      //unshift() - 맨 앞의 원소 추가
      //shift() - 맨 앞의 원소 제거 및 출력
      const queue = stack;
      console.log(queue)
      queue.push(6) //맨 마지막 원소 추가
      console.log(queue)
      console.log(queue.shift()) //맨 앞의 원소 제거 및 출력
      console.log(queue)
      console.log(queue.unshift(7)) //맨 앞의 원소 추가
      console.log(queue)


      console.log("===배열 자르기/합치기===")
      //slice() - 잘라내기
      //splice() - 합치기
      let arr1 = [10, 20, 30, 40, 50]
      const arr2 = arr1.slice(0, 2); // 잘라내기 배열 원소 일부 추출(원본유지),마지막 인자 제외
      console.log(arr2); console.log(arr1)

      const arr3 = arr1.splice(0, 2) // 잘라내기 배열의 원소 추출(원본갱신),마지막 인자 제외
      console.log(arr3); console.log("splice() 잘라내기 후", arr1)

      arr1.splice(0, 0, 10, 20) //splice(인덱스,삭제할 길이,값1,값2,...)추가, 0번째에 지우는거 없이 20추가
      console.log("splice() 추가 후: ", arr1)
      arr1.splice(0, 2, 1, 2)
      console.log("splice() 추가 후: ", arr1) // 1,2,30,40,50

      const arr4 = arr1.concat(arr3)
      console.log("concat() 합치기 후:", arr4)


      console.log("===배열 문자열로 바꾸기===")
      console.log("join() 후:", arr1.join())
      console.log("join() 후:", arr1.join('/'))
      console.log("toString() 후: ", arr1.toString())


      console.log("===배열 순서 바꾸기===")
      let arr5 = [1, 2, 3, 4, 5]
      console.log(arr5)
      console.log("reverse() 역순 후:", arr5.reverse())
      console.log("sort() 정렬 후:", arr5.sort())

      let arr6 = [10, 2, 30, 1]
      console.log("sort() 정렬 후:", arr6.sort()) //sort() 원소를 문자열로 변경 후 정렬(1,10,2,30)
      arr6.sort(function (a, b) {
        return a - b; //양수가 나오면 자리 바꿈(오름차순)
        //return b - a; //내림차순
      })

      arr6.sort((a,b) => a - b)
      console.log("sort() 정렬 후:", arr6) //sort() 원소를 문자열로 변경 후 정렬


      console.log("===배열 탐색,존재여부 바꾸기===")
      let arr7 = ["a", "b", "c", "d"]
      console.log(arr7.indexOf("a")) // 0
      console.log(arr7.indexOf("z")) //-1
      console.log(arr7.includes("a")) //false(있는지 확인)
      console.log(arr7.includes("z")) //false(있는지 확인)
      console.log(arr7.find(function (item) {
        return item == 'b'
      }))//찾으면 b반환,없으면 undefined, 조건에 맞는 첫 번째 값 찾기
      arr7.find(item => item=='b')
      //findIndex(), 조건에 맞는 첫 번째 index 찾기
      console.log("findIndex",arr7.findIndex(item => item>"b")) //2


      console.log("===배열 반복 처리===") //자주쓰임 : forEach(),map(),filter()
      //forEach(). map(), filter(), reduce(), some(), every()
      //forEach() :: 배열의 원소와 인덱스로 접근하는 stream
      let arr10 = [1,2,3,4,5]
      arr10.forEach(function(idx,item){
        console.log(idx,item)
      });
      arr10.forEach ((idx,item) => console.log("forEach()화살표함수:",idx,item))

      //map() :: 배열의 각각을 원소에 접근 후 다시 배열의 원소를 갱신할 때
      var result = arr10.map(function(item){
        return item * 2
      })
      console.log("map()result: ", result,arr10)
      console.log("map()화살표함수:",arr10.map(item => item * 2))
      
      //filter() :: 배열의 조건을 걸어서 일부만 추출할 수 있다.
      var result = arr10.filter(function(item){
        return item % 6 == 0
      })  
      console.log("item()result:",result)
      console.log("item()화살표함수:",arr10.filter(item => item%6==0),arr10)

      //reduce() :: 원소를 하나씩 제거해서 누적
      var result = arr10.reduce(function(acc,current){
        return acc+current
      },0)
      console.log(result);
      result = arr10.reduce((acc,current) => acc+current,0)
      console.log(`reduce()result:${result}`)

      //some() :: 하나라도 조건을 만족하면 true
      var result = arr10.some(function(item) {
        return item%2 ==1
      })
      result = arr10.some(item => item%2==1)
      console.log(`some()result: ${result}`)

      //every() :: 모두 조건이 만족하면 true
      var result = arr10.every(function(item) {
        return item%2 ==1
      })
      result = arr10.every(item => item%2==1)
      console.log(`every()result: ${result}`)
      
      
      console.log("===배열 평탄화===")
      let arr8 = [1, [2,3],[4,5]]
      console.log(arr8.flat()) //[1, 2, 3, 4, 5] 1차원 배열로 평탄화
      
      // flatMap() :: map() 후에 flat()까지 한번에 처리
      var result = arr10.flatMap(function(item){
        return [item, item * 2] //배열의 원소 item을 return으로 지정
      })
      result = arr10.flatMap(item => [item,item * 2])
      console.log(`flatMap()result:${result}`)


      console.log("===배열 확인===")
      console.log(Array.isArray(arr8)) // 배열 맞음 true
      console.log(Array.isArray(5)) // 배열 아님 false

      //2차원 배열
      let arr2d = [[1,2,3],[4,5,6]] //2행 3열
      
      for(let i =0;i<arr2d.length;i++){
        for(let j=0;j<arr2d[i].length;j++){
          if(j != 0) document.write(",")
          document.write(arr2d[i][j])
        }
        document.write("<br>")
      }
    </script>

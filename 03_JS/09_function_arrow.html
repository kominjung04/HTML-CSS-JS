<body>
<h1>화살표함수(arrow function :: 함수의 축약형)</h1> 
<p></p>
  <a href="/"><span class="material-icons icon">home</span>돌아가기</a>
  <hr>
  <ol>
    <li>원형 함수는 화살표 함수로 변형 불가 </li>
    <li>익명 함수만 화살표함수로 변형가능</li>
  </ol>
  <script>
    var fnc1 = function(){
      console.log("매개변수(X),리턴(X)")
    }
    fnc1 = () => console.log("매개변수(X),리턴(X)")
    fnc1()

    var fnc2 = function(a){
      console.log("매개변수(O),리턴(X)")
    }
    fnc2 = (a) => console.log(a + "매개변수(O),리턴(X)")
    fnc2 = a => console.log("매개변수(O),리턴(X)") //명령문이 한개라서 {}생략. return 아님
    fnc2()

    var fnc3 = function(){
      return ("매개변수(X),리턴(O)")
    }
    fnc3 = () => {return ("매개변수(X),리턴(O)")}
    fnc3 = () => ("매개변수(X),리턴(O)") //retrun을 생략 :: 값이기 때문에 
    console.log(fnc3())

    var fnc4 = function(a){
      return a + "매개변수(O),리턴(O)"
    }
    fnc4 = a => a + "매개변수(O),리턴(O)"
    console.log(fnc4())
  </script>
  
  <li>중첩함수의 익명함수를 화살표함수로 축약</li>
  <script>
    var fncInFcn = function(a){
      inFnc = function(b){
        return a +b;
      }
      return inFnc
    }

    fncInFcn = a => b => a + b;
    console.log(fncInFcn());
  </script>
 
</body>
</html>

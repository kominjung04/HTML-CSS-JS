<p></p>

  <script>
    for(let i=0;i<10;i++){
      let tmp = i + 1;
      if(tmp%2 == 0) continue; //아래문장 실행 안함
      console.log(tmp)
    }
    let i = 0
    while(true){
      if(i++==10) break;

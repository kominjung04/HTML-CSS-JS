<!DOCTYPE html>
<html lang="ko">
<head>

 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Document</title>
 <script>
  </script>
 <!-- Google Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
  /*전체선택자*/
  * {
    /*margin: 0px;*/
    padding: 0px;
  }

  /*태그 선택자*/
  body{
    background-color: lemonchiffon;
  }
  ul{
    list-style-type: none;
  }
  li {
    font-style: italic; 
  }

  /*아이디 선택자 - 그 부분만 선택하여 스타일을 넣고 싶을 때,display속성 block*/
  #pick{
    font-weight: bold;
    background-color: bisque;
  }

/*클래스 선택자 - 복수로 선택하여 스타일을 넣을 때,중복 적용 가능(class 공백 class),같은게 있을 경우 끝에 있는 것이 선택*/
  .text-item{
    text-decoration: underline;
  }
  .text-light{
    background-color: white;
    font-family: "궁서체";
  }

</style>
</head>

<body>
<h1>기본 선택자</h1>
  <a href="/"><span class="material-icons icon">home</span>돌아가기</a>
  <hr>
  <ul>
    <li class="text-item text-light">전체 선택자</li>
    <li class="text-item">태그 선택자</li>
    <li class="text-item text-light" id = "pick">아이디 선택자</li>
    <li class="text-item" id = "pick">클래스 선택자</li>
  </ul>
</body>
</html>

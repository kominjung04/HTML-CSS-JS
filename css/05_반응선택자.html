<!DOCTYPE html>
<html lang="ko">
<head>

 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Document</title>
 <script>
  </script>
 <!-- Google Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
  div{
    width: 300px;
    height: 200px;
    background-color: cadetblue;
  }

  div:hover {/*마우스를 올렸을 때*/
    background-color: chartreuse;
    cursor: pointer;
    }
  
  div:active{ /*마우스를 클릭하고 있을때*/
    background-color: red;
  }
</style>
</head>

<body>
<h1>반응선택자</h1>  
<a href="/"><span class="material-icons icon">home</span>돌아가기</a>
<p>hover 마우스가 해당 태그의 위로 올라갈때, active 이벤트가 발생할 때</p>
<hr>
<div>
  <p>반응선택자</p>
</div>
</body>
</html>

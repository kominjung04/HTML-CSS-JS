<!DOCTYPE html>
<html lang="ko">
<head>

 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Document</title>
 <!-- Google Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style></style>
 <script>
  </script>
</head>

<body>
<h1>이벤트 target: delegation(위임), matches(), closest()</h1> 
<p></p>
  <a href="/"><span class="material-icons icon">home</span>돌아가기</a>
  <hr>
  <ul>
    <li>delegation 위임</li>
    <ul id="menu">
      <li>짜장</li>      
      <li>짬봉</li>      
      <li>우동</li>      
      <li>탕수육</li>      
    </ul>
    <script>
      const menu = document.getElementById('menu')
      menu.addEventListener("click",(e) =>{
        //li가 ul의 하위요소이기 때문에 버블링을 역으로 이용
        alert("클릭한 항목: "+ e.target.textContent) 
      }, )
      </script>
    <li>matches()</li> 
    <script>
      menu.addEventListener("click",(e) =>{
        if(e.target.matches("li")){
        alert("클릭한 항목: "+ e.target.textContent) 
      }
      },)
    </script>
    <li>closest()</li> 
    <script>
      menu.addEventListener("click",(e)=> {
        const li = e.target.closest("li")
        if(li) {
        alert("클릭한 항목: "+ e.target.textContent) 
        }
      })
    </script>
  </ul>
 
</body>
</html>

<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>position속성</title>
  <!--웹 폰트를 html에 적용할 때-->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    .box{
      width: 100px;
      height: 100px;
      background-color: aqua;
      position: relative;
      border-radius: 50%;

      animation:ChangeEffect 3s infinite alternate; /* 3초 무한정 방향은 교대로*/
    }
    @keyframes ChangeEffect{
      0% {background-color: aqua; transform: scale(1);}
      50%{background-color: rgb(51, 158, 158); transform: scale(1.3);}
      100%{background-color: rgb(5, 48, 48);transform: scale(1);}
    }
  div:hover {/*마우스를 올렸을 때*/
    background-color: chartreuse;
    cursor: pointer;
    }
  </style>
</head>

<body>
  <h1>CSS animation 효과주기 2</h1>
  <p>%이용</p>
  <a href="/"><span class="material-icons icon">home</span>돌아가기</a>
  <hr>
  <div class="box"></div>
</body>

</html>

<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>background속성</title>
  <!--웹 폰트를 html에 적용할 때-->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    * {
      padding: 0;
      margin: 0;
    }

    body {
      background-image: url('/images/BackgroundFront.png'), url('/images/BackgroundBack.png');
      background-size: 50%;
      background-repeat: no-repeat;
      background-position: center left; /* 화면 크기를 기준으로 top,center,bottom,left,right*/
      min-height: 100vh;
      /* 화면의 최소크기 지정 */
      height: 100%;
    }
  </style>
</head>

<body>
  <h1>CSS의 background속성</h1>
  <p></p>
  <a href="/"><span class="material-icons icon">home</span>돌아가기</a>
  <hr>


</body>

</html>

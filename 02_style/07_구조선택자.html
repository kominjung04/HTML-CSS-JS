<!DOCTYPE html>
<html lang="ko">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <!-- Google Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script>
  </script>
  <style>
    ul li:nth-child(2n+1) { /*ul밑에 홀수번에 빨간색글자로 바꿔라*/
      color: red;
      font-weight: bold;
    }
    ul span:nth-child(2n) { /*ul밑에 짝수번에 빨간색글자로 바꿔라*/
      color: blue;
      font-weight: bold;
    }
    ul li:first-child{ /*ul밑 li에 첫번째 줄에 색깔을 줘라*/
      background-color: darkorange;
    }
    ul span:last-child{ /*ul밑 span에 마지막 줄에 색깔을 줘라*/
      background-color: darkorange;
    }
    ol li:nth-of-type(2n){
      color: red;
      font-weight: bold;
    }
    ol li:nth-of-type(2n+1){
      color: blue;
      font-weight: bold;
    }
    ol li:first-of-type {
      background-color: yellow;
    }
    ol li:last-of-type {
      background-color: yellow;
    }
    
    </style>
</head>

<body>
  <h1>구조선택자</h1>
  <p></p>
  <a href="/"><span class="material-icons icon">home</span>돌아가기</a>
  <hr>
  <ul>
    <li>list 1</li>
    <span>span 1</span>
    <li>list 2</li>
    <span>span 2</span>
    <li>list 3</li>
    <span>span 3</span>
    <li>list 4</li>
    <span>span 4</span>
    <li>list 5</li>
    <span>span 5</span>
  </ul>
  <ol>
    <li>list 1</li>
    <span>span 1</span>
    <li>list 2</li>
    <span>span 2</span>
    <li>list 3</li>
    <span>span 3</span>
    <li>list 4</li>
    <span>span 4</span>
    <li>list 5</li>
    <span>span 5</span>
  </ol>

</body>

</html>

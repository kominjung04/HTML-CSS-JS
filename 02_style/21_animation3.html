<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>position속성</title>
  <!--웹 폰트를 html에 적용할 때-->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=frame_exclamation" />
  <style>
    .btn{
      padding: 15px 30px;
      color: tomato;
      font-size: 20pt; 
      transition: all 0.3s ease;cursor: pointer;
    }
    .btn:hover{
      color: red;transform: scale(2) /*rotate(360deg);*/
    }
    .material-symbols-outlined {
      font-variation-settings:
      'FILL' 0,
      'wght' 400,
      'GRAD' 0,
      'opsz' 24
    }
  </style>
</head>

<body>
  <h1>CSS animation 효과주기 3</h1>
  <p></p>
  <a href="/"><span class="material-icons icon">home</span>돌아가기</a>
  <hr>
  <span class="material-symbols-outlined btn">frame_exclamation</span>
</body>

</html>

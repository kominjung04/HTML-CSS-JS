<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>background속성</title>
  <!--웹 폰트를 html에 적용할 때-->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    span {
      background: yellow;
      border: solid 2px black;
    }

    div {
      background-color: aquamarine;
      margin: 10px 0;
      border: double 2px black;
      /*solid, dotted , double*/
      margin: 20px 0 0 0;
      padding: 20px;
      width: 200px;
      border-radius: 20px 0 20px 0;
    }

    .circle {
      padding: 0;
      background-color: aqua;
      border-radius: 100px;
      width: 100px;
      height: 100px;
      text-align: center;
      line-height: 95px;
      text-align: center;
      font-size: 30px;
      border-top: 0px solid white;
    }
  </style>
</head>

<body>
  <h1>Box속성</h1>
  <p>모든 태그는 사각형의 테두리를 가진다</p>
  <a href="/"><span class="material-icons icon">home</span>돌아가기</a>
  <hr>
  <span>span box</span>
  <div>div box</div>
  <div class="circle">circle</div>
</body>

</html>

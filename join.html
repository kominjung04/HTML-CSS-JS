<!DOCTYPE html>
<html lang="ko">
<head>

 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Document</title>
 <script>
  </script>
 <!-- Google Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

</head>

<body>
<h1>회원가입</h1>
<a href="index.html"><span class="material-icons icon">home</span>돌아가기</a>
  <hr>
  <fieldset><legend>회원가입</legend>
  <form action="/" method="post">
    <div>
          <label for="ID">ID
            <input type="text" name="ID" id="ID" placeholder="아이디">
          </label>
        </div>

        <div>
          <label for="pass">Pass
            <input type="password" name="pw" id="pass" placeholder="비밀번호">
          </label>
        </div>

        <div>
          <label for="Repass">RePass
            <input type="password" name="Repw" id="Repass" placeholder="비밀번호 확인">
          </label>
        </div>

        <div>
          <label for="name">이름</label>
          <input type="text" name="name" id="name" placeholder="이름을 입력해주세요">
        </div>
        <div>
          <label for="email">email</label>
          <input type="text" name="email" id="email">
          <select  name = @email id = @email>
            <option value="선택하시오">선택하세요</option>
            <option value="@naver.com">@naver.com</option>
            <option value="@gmail.com">@gmail.com</option>
          </select>
        </div>

        <div>
          <label for="mobile">mobile</label>
          <input type="text" name="mobile" id="mobile">
        </div>
        
        <div>
          <button>가입</button>
          <button type="reset">취소</button>
        </div>

  </form>
  </fieldset>

</body>

</html>
